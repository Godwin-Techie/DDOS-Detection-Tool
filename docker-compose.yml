# 'version' tells Docker which set of rules/features we are using for this file.
version: "3"

# 'services' is where we define the different "apps" or "containers" we want to run.
services:
  # --- The First Service: Nextclou
  # This is the actual web application (a cloud storage site).
  nextcloud:
    # 'image' tells Docker which pre-made software package to download.
    image: kefaslungu/hng-nextcloud
    # 'restart: unless-stopped' means if the app crashes or the computer restarts, turn it back on.
    restart: unless-stopped
    # 'networks' puts this app on a specific private "virtual Wi-Fi" so it can talk to others.
    networks:
      - hng-net

  # --- The Second Service: Nginx ---
  # This acts as the "Gatekeeper" or "Proxy." Everyone visits Nginx first.
  nginx:
    # Use the official, latest version of the Nginx software.
    image: nginx:latest
    # Give the container a specific name so we can find it easily in our list.
    container_name: hng-nginx
    restart: unless-stopped
    # 'volumes' allow the container to share folders with your actual computer.
    volumes:
      # 1. Take our 'nginx.conf' settings file and put it inside the container (Read-Only).
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 2. Create a shared "folder" (volume) where Nginx will write its visit logs.
      - HNG-nginx-logs:/var/log/nginx
    # 'ports' maps your computer's port to the container's port.
    # You will visit "http://localhost:8080" to see the website.
    ports:
      - "8080:80"
    networks:
      - hng-net

  # --- The Third Service: Detector ---
  # This is the custom Python security system that watches for attacks.
  detector:
    # 'build' tells Docker to create a NEW image using the 'Dockerfile' in this folder.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hng-detector
    restart: unless-stopped
    volumes:
      # This is the most important part!
      # It shares the SAME log folder that Nginx is writing to.
      # ':ro' means the Detector can READ the logs but cannot delete or change them.
      - HNG-nginx-logs:/var/log/nginx:ro
    cap_add:
      - NET_ADMIN # This gives the Detector special permissions to block bad IPs at the network level.
      - NET_RAW # This allows the Detector to see all network traffic, which is necessary for its job.
    network_mode: "host" # This allows the Detector to see all network traffic on the host machine, which is necessary for its job.

# 'volumes' defines the "shared storage" we mentioned above.
# Think of 'HNG-nginx-logs' as a shared USB drive plugged into Nginx and Detector.
volumes:
  HNG-nginx-logs:

# 'networks' defines the private communication channel for our three services.
networks:
  hng-net:
    # 'bridge' is the standard way for containers on the same computer to talk to each other.
    driver: bridge
